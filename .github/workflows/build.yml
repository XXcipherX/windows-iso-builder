name: Build Windows
run-name: >
  ${{ inputs.versions }}
  ${{ fromJSON('{"Pro":"PRO","Home":"HOME"}')[inputs.edition] }}
  ${{ fromJSON('{"x64":"X64","arm64":"ARM64"}')[inputs.architecture] }}
  ${{ fromJSON('{
    "Arabic (Saudi Arabia)":"AR","Bulgarian (Bulgaria)":"BG","Czech (Czech Republic)":"CS","Danish (Denmark)":"DA","German (Germany)":"DE","Greek (Greece)":"EL",
    "English (United Kingdom)":"EN","English (United States)":"EN","Spanish (Spain)":"ES","Spanish (Mexico)":"ES","Estonian (Estonia)":"ET","Finnish (Finland)":"FI",
    "French (Canada)":"FR","French (France)":"FR","Hebrew (Israel)":"HE","Croatian (Croatia)":"HR","Hungarian (Hungary)":"HU","Italian (Italy)":"IT",
    "Japanese (Japan)":"JA","Korean (Korea)":"KO","Lithuanian (Lithuania)":"LT","Latvian (Latvia)":"LV","Norwegian Bokmål (Norway)":"NB",
    "Dutch (Netherlands)":"NL","Polish (Poland)":"PL","Portuguese (Brazil)":"PT","Portuguese (Portugal)":"PT","Romanian (Romania)":"RO","Russian (Russia)":"RU",
    "Slovak (Slovakia)":"SK","Slovenian (Slovenia)":"SL","Serbian (Latin, Serbia)":"SR","Swedish (Sweden)":"SV","Thai (Thailand)":"TH","Turkish (Turkey)":"TR",
    "Ukrainian (Ukraine)":"UK","Chinese (Simplified, China)":"ZH","Chinese (Traditional, Taiwan)":"ZH"
  }')[inputs.language] }}
  ${{ inputs.esd && 'ESD' || '' }}
  ${{ inputs.netfx3 && 'NETFX3' || '' }}
  ${{ inputs.tiny11 && 'TINY11' || '' }}

on:
  workflow_dispatch:
    inputs:
      architecture:
        description: "Windows architecture to build"
        type: choice
        options: [x64, arm64]
        default: x64
        required: true
      versions:
        description: "Windows version to build"
        type: choice
        options:
          - Windows 11 25H2
          - Windows 11 25H2 BETA
          - Windows 11 26H1
          - Windows DEV
          - Windows CANARY
        default: Windows 11 25H2
        required: true
      edition:
        description: "Windows edition to build"
        type: choice
        options: [Pro, Home]
        default: Pro
        required: true
      language:
        description: "Language"
        type: choice
        options:
          - Arabic (Saudi Arabia)
          - Bulgarian (Bulgaria)
          - Czech (Czech Republic)
          - Danish (Denmark)
          - German (Germany)
          - Greek (Greece)
          - English (United Kingdom)
          - English (United States)
          - Spanish (Spain)
          - Spanish (Mexico)
          - Estonian (Estonia)
          - Finnish (Finland)
          - French (Canada)
          - French (France)
          - Hebrew (Israel)
          - Croatian (Croatia)
          - Hungarian (Hungary)
          - Italian (Italy)
          - Japanese (Japan)
          - Korean (Korea)
          - Lithuanian (Lithuania)
          - Latvian (Latvia)
          - "Norwegian Bokmål (Norway)"
          - Dutch (Netherlands)
          - Polish (Poland)
          - Portuguese (Brazil)
          - Portuguese (Portugal)
          - Romanian (Romania)
          - Russian (Russia)
          - Slovak (Slovakia)
          - Slovenian (Slovenia)
          - Serbian (Latin, Serbia)
          - Swedish (Sweden)
          - Thai (Thailand)
          - Turkish (Turkey)
          - Ukrainian (Ukraine)
          - Chinese (Simplified, China)
          - Chinese (Traditional, Taiwan)
        default: English (United States)
        required: true
      revision:
        description: "Revision number (optional)"
        type: string
        required: false
      esd:
        description: "Use ESD compression"
        type: boolean
        required: true
        default: false
      netfx3:
        description: "Add .NET Framework 3.5"
        type: boolean
        required: true
        default: false
      tiny11:
        description: "Apply Tiny11 optimization (debloat, registry tweaks, system requirements bypass)"
        type: boolean
        required: true
        default: true

jobs:
  build:
    runs-on: ${{ fromJSON('{"x64":"windows-latest","arm64":"windows-11-arm"}')[inputs.architecture] }}
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Map inputs
        id: map
        shell: pwsh
        run: |
          $langMap = @{
            'Arabic (Saudi Arabia)'='ar-sa'
            'Bulgarian (Bulgaria)'='bg-bg'
            'Czech (Czech Republic)'='cs-cz'
            'Danish (Denmark)'='da-dk'
            'German (Germany)'='de-de'
            'Greek (Greece)'='el-gr'
            'English (United Kingdom)'='en-gb'
            'English (United States)'='en-us'
            'Spanish (Spain)'='es-es'
            'Spanish (Mexico)'='es-mx'
            'Estonian (Estonia)'='et-ee'
            'Finnish (Finland)'='fi-fi'
            'French (Canada)'='fr-ca'
            'French (France)'='fr-fr'
            'Hebrew (Israel)'='he-il'
            'Croatian (Croatia)'='hr-hr'
            'Hungarian (Hungary)'='hu-hu'
            'Italian (Italy)'='it-it'
            'Japanese (Japan)'='ja-jp'
            'Korean (Korea)'='ko-kr'
            'Lithuanian (Lithuania)'='lt-lt'
            'Latvian (Latvia)'='lv-lv'
            'Norwegian Bokmål (Norway)'='nb-no'
            'Dutch (Netherlands)'='nl-nl'
            'Polish (Poland)'='pl-pl'
            'Portuguese (Brazil)'='pt-br'
            'Portuguese (Portugal)'='pt-pt'
            'Romanian (Romania)'='ro-ro'
            'Russian (Russia)'='ru-ru'
            'Slovak (Slovakia)'='sk-sk'
            'Slovenian (Slovenia)'='sl-si'
            'Serbian (Latin, Serbia)'='sr-latn-rs'
            'Swedish (Sweden)'='sv-se'
            'Thai (Thailand)'='th-th'
            'Turkish (Turkey)'='tr-tr'
            'Ukrainian (Ukraine)'='uk-ua'
            'Chinese (Simplified, China)'='zh-cn'
            'Chinese (Traditional, Taiwan)'='zh-tw'
          }

          $verMap = @{
            'Windows 11 25H2'      = 'win11-25h2'
            'Windows 11 25H2 BETA' = 'win11-25h2-beta'
            'Windows 11 26H1'      = 'win11-26h1'
            'Windows DEV'          = 'win11-dev'
            'Windows CANARY'       = 'win11-canary'
          }

          $langCode = $langMap['${{ inputs.language }}']
          $verCode  = $verMap['${{ inputs.versions }}']
          $uupEsd   = ('${{ inputs.esd }}' -eq 'true' -and '${{ inputs.tiny11 }}' -ne 'true')

          if (-not $langCode) {
            throw "Unsupported language mapping: ${{ inputs.language }}"
          }
          if (-not $verCode) {
            throw "Unsupported version mapping: ${{ inputs.versions }}"
          }

          echo "lang=$langCode"    >> $env:GITHUB_OUTPUT
          echo "version=$verCode"  >> $env:GITHUB_OUTPUT
          echo "uup_esd=$uupEsd"   >> $env:GITHUB_OUTPUT

      - name: Free disk space (safe)
        shell: pwsh
        run: |
         Write-Host "Free space before:"
         Get-PSDrive C

         Remove-Item -Recurse -Force "C:\Program Files\Microsoft Visual Studio" -ErrorAction SilentlyContinue
         Remove-Item -Recurse -Force "C:\Program Files (x86)\Microsoft Visual Studio" -ErrorAction SilentlyContinue
         Remove-Item -Recurse -Force "C:\Program Files\Android" -ErrorAction SilentlyContinue
         Remove-Item -Recurse -Force "$env:TEMP\*" -ErrorAction SilentlyContinue
         Remove-Item -Recurse -Force "C:\Windows\Temp\*" -ErrorAction SilentlyContinue

         Write-Host "Free space after:"
         Get-PSDrive C

      - name: Install ADK Deployment Tools (oscdimg)
        if: ${{ inputs.tiny11 }}
        shell: pwsh
        run: |
          $adkPath = "C:\Program Files (x86)\Windows Kits\10\Assessment and Deployment Kit\Deployment Tools"
          if (Test-Path "$adkPath\$env:PROCESSOR_ARCHITECTURE\Oscdimg\oscdimg.exe") {
            Write-Output "ADK Deployment Tools already installed, skipping."
            return
          }
          Write-Output "Downloading Windows ADK setup..."
          $adkSetup = Join-Path $env:RUNNER_TEMP "adksetup.exe"
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/?linkid=2337875" -OutFile $adkSetup -UseBasicParsing
          Write-Output "Installing ADK Deployment Tools (oscdimg)..."
          Start-Process -Wait -FilePath $adkSetup -ArgumentList '/quiet', '/norestart', '/features', 'OptionId.DeploymentTools'
          if (Test-Path "$adkPath\$env:PROCESSOR_ARCHITECTURE\Oscdimg\oscdimg.exe") {
            Write-Output "ADK Deployment Tools installed successfully."
          } else {
            Write-Output "::warning::ADK install may have failed. Tiny11 will fall back to downloading oscdimg.exe."
          }

      # ============================================================
      # STAGE 1: Build Windows ISO via UUP dump
      # ============================================================

      - name: Build Windows ISO (UUP dump)
        id: build_windows
        shell: pwsh
        run: |
          $splat = @{
            windowsTargetName    = '${{ steps.map.outputs.version }}'
            destinationDirectory = 'c:/output'
            architecture         = '${{ inputs.architecture }}'
            edition              = '${{ inputs.edition }}'
            lang                 = '${{ steps.map.outputs.lang }}'
          }

          # If Tiny11 is enabled, skip UUP dump ESD compression (Tiny11 re-compresses it anyway)
          if ('${{ steps.map.outputs.uup_esd }}' -eq 'true') { $splat.esd = $true }
          if ('${{ inputs.netfx3 }}' -eq 'true') { $splat.netfx3 = $true }
          if ('${{ inputs.tiny11 }}' -eq 'true') {
            $splat.SkipChecksum = $true
            $splat.SkipImageMetadata = $true
          }

          if (-not [string]::IsNullOrWhiteSpace('${{ inputs.revision }}')) {
            $splat.revision = '${{ inputs.revision }}'
          }

          .\uup-dump-get-windows-iso.ps1 @splat

      # ============================================================
      # STAGE 2: Tiny11 optimization (optional)
      # ============================================================

      - name: Prepare autounattend.xml for Tiny11
        if: ${{ inputs.tiny11 }}
        shell: pwsh
        run: |
          if (Test-Path "autounattend.xml") {
            Write-Output "Copying autounattend.xml to scripts directory"
            Copy-Item "autounattend.xml" "scripts\autounattend.xml" -Force
          } else {
            Write-Error "autounattend.xml not found in repository root!"
            exit 1
          }

      - name: Run Tiny11 optimization
        if: ${{ inputs.tiny11 }}
        shell: pwsh
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force

          $isoPath = $env:ISO_PATH
          if (-not $isoPath -or -not (Test-Path $isoPath)) {
            Write-Error "Built ISO not found at: $isoPath"
            exit 1
          }

          Write-Output "=== Starting Tiny11 Optimization ==="
          Write-Output "Source ISO: $isoPath"
          Write-Output "Timestamp: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')"

          $startTime = Get-Date

          $splat = @{
            ISOPath = $isoPath
            INDEX   = 1
          }
          if ('${{ inputs.esd }}' -eq 'true') { $splat.ESD = $true }

          # INDEX=1: UUP dump builds a single-edition ISO, so the WIM always has index 1
          .\scripts\tiny11maker-headless.ps1 @splat

          $buildTime = (Get-Date) - $startTime
          Write-Output "Tiny11 optimization completed in $($buildTime.TotalMinutes.ToString('F2')) minutes"

      - name: Finalize Tiny11 ISO
        if: ${{ inputs.tiny11 }}
        shell: pwsh
        run: |
          $tiny11Iso = ".\scripts\tiny11.iso"

          if (-not (Test-Path $tiny11Iso)) {
            Write-Error "Tiny11 ISO was not created!"
            Write-Output "Contents of scripts directory:"
            Get-ChildItem -Path ".\scripts" | Format-Table Name, Length, LastWriteTime
            exit 1
          }

          # Replace the original ISO only after the Tiny11 ISO is safely moved in place
          $originalIso = $env:ISO_PATH
          if (-not $originalIso -or -not (Test-Path $originalIso)) {
            Write-Error "Original ISO path is missing or not found: $originalIso"
            exit 1
          }

          $destinationDir = Split-Path $originalIso -Parent
          $baseName = $env:ISO_NAME
          if ($baseName -match '(?i)(.*)(\.iso)$') {
            $isoName = $matches[1] + "_Tiny11" + $matches[2]
          } else {
            $isoName = $baseName + "_Tiny11.iso"
          }
          $newIsoPath = "$destinationDir\$isoName"
          $tempIsoPath = "$newIsoPath.tmp"

          if (Test-Path $tempIsoPath) {
            Remove-Item -Path $tempIsoPath -Force
          }
          Move-Item -Path $tiny11Iso -Destination $tempIsoPath -Force
          if (-not (Test-Path $tempIsoPath)) {
            Write-Error "Temporary Tiny11 ISO move failed: $tempIsoPath"
            exit 1
          }

          if (Test-Path $newIsoPath) {
            Remove-Item -Path $newIsoPath -Force
          }
          Move-Item -Path $tempIsoPath -Destination $newIsoPath -Force
          if (-not (Test-Path $newIsoPath)) {
            Write-Error "Final Tiny11 ISO move failed: $newIsoPath"
            exit 1
          }

          if (Test-Path $originalIso) {
            Remove-Item -Path $originalIso -Force
          }
          if (Test-Path "$originalIso.sha256.txt") {
            Remove-Item -Path "$originalIso.sha256.txt" -Force
          }

          # Recalculate checksum for the optimized ISO
          Write-Output "Recalculating checksum for optimized ISO..."
          $newChecksum = (Get-FileHash -Algorithm SHA256 $newIsoPath).Hash.ToLowerInvariant()
          Set-Content -Encoding ascii -NoNewline -Path "$newIsoPath.sha256.txt" -Value $newChecksum

          $sizeGB = [math]::Round((Get-Item $newIsoPath).Length / 1GB, 2)
          Write-Output "Tiny11 ISO finalized: $isoName (${sizeGB}GB)"
          Write-Output "SHA256: $newChecksum"

          # Update env for summary and artifact upload
          echo "ISO_NAME=$isoName" >> $env:GITHUB_ENV
          echo "ISO_PATH=$newIsoPath" >> $env:GITHUB_ENV
          echo "ISO_CHECKSUM=$newChecksum" >> $env:GITHUB_ENV
          echo "ISO_SIZE_GB=$sizeGB" >> $env:GITHUB_ENV

      # ============================================================
      # STAGE 3: Upload & Summary
      # ============================================================

      - name: Generate verification instructions
        shell: pwsh
        run: |
          $isoPath = $env:ISO_PATH
          $isoDir = Split-Path $isoPath -Parent
          $isoName = Split-Path $isoPath -Leaf
          
          Write-Output "Preparing verification files for $isoName..."
          
          # Reuse the SHA256 checksum that was already calculated in STAGE 1 or STAGE 2
          $sha256 = (Get-Content "$isoPath.sha256.txt" -Raw).Trim()
          Set-Content -Encoding ascii -Path "$isoDir\$isoName.sha256" -Value "$sha256 *$isoName"
          
          $instructions = @"
          To verify the authenticity of the ISO file, run the following commands in the folder containing the ISO:
          
          Windows (PowerShell):
          Get-FileHash -Algorithm SHA256 "$isoName"
          
          Linux / macOS:
          sha256sum -c "$isoName.sha256"
          # Or manually:
          sha256sum "$isoName"
          "@
          Set-Content -Encoding utf8 -Path "$isoDir\verify_checksums.txt" -Value $instructions

      - name: Upload ISO artifact
        id: upload_iso_artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ISO_NAME }}
          path: |
            c:/output/*.ISO
            c:/output/*.sha256
            c:/output/verify_checksums.txt
          compression-level: 0
          if-no-files-found: error

      - name: Set artifact_url
        id: set_artifact_url
        shell: pwsh
        run: echo "artifact_url=${{ steps.upload_iso_artifact.outputs.artifact-url }}" >> $env:GITHUB_ENV

      - name: Build summary
        id: build_summary
        shell: pwsh
        run: |
          $iso = Get-Content (Resolve-Path c:/output/*.json) | ConvertFrom-Json
          $imageNames = $iso.images | ForEach-Object { $_.name }
          if ($imageNames.Count -gt 1) {
            if ($imageNames[0] -match '^(Windows (10|11))\s*(.*)') {
              $prefix = $matches[1]
              $first = $imageNames[0]
              $rest = $imageNames[1..($imageNames.Count - 1)] | ForEach-Object { ($_ -replace "^$prefix\s*", '') }
              $finalImageName = $first + '/' + ($rest -join '/')
            } else {
              $finalImageName = $imageNames -join '/'
            }
          } else {
            $finalImageName = $imageNames
          }

          # Use Tiny11 checksum if available, otherwise use UUP dump checksum
          $checksum = if ($env:ISO_CHECKSUM) { $env:ISO_CHECKSUM } else { $iso.checksum }

          $optsRow = $null
          $buildOptions = @()
          if ('${{ steps.map.outputs.uup_esd }}' -eq 'true') {
            $buildOptions += 'Use ESD compression'
          }
          if ('${{ inputs.netfx3 }}' -eq 'true') {
            $buildOptions += 'Add .NET Framework 3.5'
          }
          if (-not [string]::IsNullOrWhiteSpace('${{ inputs.revision }}')) {
            $buildOptions += "Revision: ${{ inputs.revision }}"
          }

          if ($buildOptions.Count -gt 0) {
            $optsFormatted = ($buildOptions | ForEach-Object { "<li>$($_)</li>" }) -join ''
            $optsRow = "| Build config | <ul>$optsFormatted</ul> |"
          }

          $tiny11Row = ""
          if ('${{ inputs.tiny11 }}' -eq 'true') {
            $tiny11Row = "| Tiny11 | ✅ Applied (debloat + registry tweaks + bypass) |"
          }

          Add-Content $env:GITHUB_STEP_SUMMARY @"
          ### FILE INFO:
          | Property | Value |
          | :--- | :--- |
          | Name | $finalImageName $($iso.version) |
          | Build | $($iso.build) |
          | Architecture | ${{ inputs.architecture }} |
          "@

          if ($optsRow) {
            Add-Content $env:GITHUB_STEP_SUMMARY $optsRow
          }
          if ($tiny11Row) {
            Add-Content $env:GITHUB_STEP_SUMMARY $tiny11Row
          }

          Add-Content $env:GITHUB_STEP_SUMMARY @"
          | Checksum | $checksum |
          | Image Name | $finalImageName |
          | Iso | [$env:ISO_NAME]($env:artifact_url) |
          | UUP dump | [$($iso.title)]($($iso.uupDump.downloadUrl)) |
          "@
