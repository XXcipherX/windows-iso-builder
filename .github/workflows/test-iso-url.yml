name: Test Windows ISO from URL
run-name: >
  Test external Windows ISO
  ${{ inputs.install_test && 'with full installation' || inputs.boot_test && 'with QEMU boot' || 'structure only' }}

on:
  workflow_dispatch:
    inputs:
      iso_url:
        description: "Direct HTTPS URL to an x64 Windows ISO"
        type: string
        required: true
      expected_sha256:
        description: "Expected SHA256 (optional)"
        type: string
        required: false
      boot_test:
        description: "Verify Windows PE boot in QEMU (skipped by full installation test)"
        type: boolean
        required: true
        default: true
      install_test:
        description: "Validate, install x64 Windows in QEMU, and audit first boot"
        type: boolean
        required: true
        default: false
      tiny11_audit:
        description: "Audit this repository's Tiny11 settings after installation"
        type: boolean
        required: true
        default: true

jobs:
  test_iso:
    name: Validate external ISO
    runs-on: ubuntu-24.04
    timeout-minutes: 150
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Free disk space for installation test
        if: ${{ inputs.install_test }}
        shell: bash
        run: |
          echo "Free space before:"
          df -h / /mnt || true

          sudo rm -rf -- \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /usr/share/swift \
            /opt/ghc \
            /usr/local/.ghcup \
            /opt/hostedtoolcache/CodeQL
          sudo apt-get clean

          echo "Free space after:"
          df -h / /mnt || true

      - name: Download ISO
        shell: bash
        env:
          ISO_URL: ${{ inputs.iso_url }}
        run: |
          if [[ ! "$ISO_URL" =~ ^https:// ]]; then
            echo "Only direct HTTPS URLs are accepted." >&2
            exit 1
          fi

          mkdir -p test-input
          curl \
            --proto '=https' \
            --proto-redir '=https' \
            --fail \
            --location \
            --retry 5 \
            --retry-all-errors \
            --connect-timeout 30 \
            --max-filesize 12884901888 \
            --max-time 3600 \
            --silent \
            --show-error \
            --output test-input/external.iso \
            "$ISO_URL"

      - name: Verify expected checksum
        if: ${{ inputs.expected_sha256 != '' }}
        shell: pwsh
        env:
          EXPECTED_SHA256: ${{ inputs.expected_sha256 }}
        run: |
          $expected = $env:EXPECTED_SHA256.Trim().ToLowerInvariant()
          if ($expected -notmatch '^[0-9a-f]{64}$') {
            throw 'Expected SHA256 must contain exactly 64 hexadecimal characters.'
          }

          $actual = (Get-FileHash -LiteralPath 'test-input/external.iso' -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -ne $expected) {
            throw "SHA256 mismatch. Expected $expected; got $actual."
          }
          Write-Output "SHA256 matches: $actual"

      - name: Install ISO test dependencies
        shell: bash
        run: |
          sudo apt-get update
          packages=(wimtools)
          if [[ '${{ inputs.boot_test }}' == 'true' || '${{ inputs.install_test }}' == 'true' ]]; then
            packages+=(dosfstools ovmf qemu-system-x86)
          fi
          if [[ '${{ inputs.install_test }}' == 'true' ]]; then
            packages+=(qemu-utils)
          fi
          sudo apt-get install --yes --no-install-recommends "${packages[@]}"

      - name: Validate ISO
        shell: pwsh
        run: |
          $splat = @{
            ISOPath          = 'test-input/external.iso'
            ReportDirectory = 'validation-results'
            BootTimeoutMinutes = 20
          }
          if ('${{ inputs.boot_test }}' -ne 'true' -or '${{ inputs.install_test }}' -eq 'true') {
            $splat.SkipBoot = $true
          }

          ./scripts/test-windows-iso.ps1 @splat

      - name: Install Windows and audit first boot
        if: ${{ inputs.install_test }}
        shell: pwsh
        run: |
          $splat = @{
            ISOPath         = 'test-input/external.iso'
            TimeoutMinutes  = 75
            ReportDirectory = 'install-results'
          }
          if ('${{ inputs.tiny11_audit }}' -eq 'true') {
            $splat.AuditTiny11 = $true
          }

          ./scripts/test-windows-install.ps1 @splat

      - name: Add ISO test summary
        if: ${{ always() }}
        shell: pwsh
        run: |
          Add-Content $env:GITHUB_STEP_SUMMARY '### External ISO validation'
          if (Test-Path -LiteralPath 'validation-results/iso-validation.log') {
            Add-Content $env:GITHUB_STEP_SUMMARY '```text'
            Get-Content -LiteralPath 'validation-results/iso-validation.log' -Tail 80 |
              Add-Content $env:GITHUB_STEP_SUMMARY
            Add-Content $env:GITHUB_STEP_SUMMARY '```'
          }
          else {
            Add-Content $env:GITHUB_STEP_SUMMARY 'The test stopped before a validation report was created.'
          }

          if (Test-Path -LiteralPath 'install-results/install-test-summary.md') {
            Get-Content -LiteralPath 'install-results/install-test-summary.md' |
              Add-Content $env:GITHUB_STEP_SUMMARY
          }
          elseif ('${{ inputs.install_test }}' -eq 'true') {
            Add-Content $env:GITHUB_STEP_SUMMARY '### Full Windows installation test'
            if (Test-Path -LiteralPath 'install-results/windows-install-test.log') {
              Add-Content $env:GITHUB_STEP_SUMMARY '```text'
              Get-Content -LiteralPath 'install-results/windows-install-test.log' -Tail 80 |
                Add-Content $env:GITHUB_STEP_SUMMARY
              Add-Content $env:GITHUB_STEP_SUMMARY '```'
            }
            else {
              Add-Content $env:GITHUB_STEP_SUMMARY 'The installation test stopped before a report was created.'
            }
          }

      - name: Upload ISO test diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: external-iso-test-diagnostics
          path: |
            validation-results/
            install-results/
          if-no-files-found: warn
